general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(ffffffee) rgba(999999ee) 45deg
    col.inactive_border = rgba(585b70aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(0,0,0,0.5)
    }
    blur {
        enabled = true
        size = 5
        passes = 3
    }
}