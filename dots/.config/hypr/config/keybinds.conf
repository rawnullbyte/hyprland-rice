$mainMod = SUPER

# Core Binds
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, L, exec, $lockScreen
bind = ALT, w, exec, ~/.config/hypr/scripts/wallpaper.sh

# Rofi / Menu
bindr = $mainMod, SUPER_L, exec, pkill rofi || $menu

# Clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshots
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh screenshot
bind = $mainMod SHIFT, E, exec, ~/.config/hypr/scripts/screenshot.sh edit
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh edit

# Navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/workspace.sh switch 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/workspace.sh switch 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/workspace.sh switch 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/workspace.sh switch 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/workspace.sh switch 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/workspace.sh switch 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/workspace.sh switch 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/workspace.sh switch 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/workspace.sh switch 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/workspace.sh switch 0

# Move to Workspace
bind = $mainMod ALT, 1, exec, ~/.config/hypr/scripts/workspace.sh move 1
bind = $mainMod ALT, 2, exec, ~/.config/hypr/scripts/workspace.sh move 2
bind = $mainMod ALT, 3, exec, ~/.config/hypr/scripts/workspace.sh move 3
bind = $mainMod ALT, 4, exec, ~/.config/hypr/scripts/workspace.sh move 4
bind = $mainMod ALT, 5, exec, ~/.config/hypr/scripts/workspace.sh move 5
bind = $mainMod ALT, 6, exec, ~/.config/hypr/scripts/workspace.sh move 6
bind = $mainMod ALT, 7, exec, ~/.config/hypr/scripts/workspace.sh move 7
bind = $mainMod ALT, 8, exec, ~/.config/hypr/scripts/workspace.sh move 8
bind = $mainMod ALT, 9, exec, ~/.config/hypr/scripts/workspace.sh move 9
bind = $mainMod ALT, 0, exec, ~/.config/hypr/scripts/workspace.sh move 0

# Media / Brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow