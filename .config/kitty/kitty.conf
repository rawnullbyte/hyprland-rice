# Kitty Configuration
# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12

# Window
window_padding_width 8
confirm_os_window_close 0
remember_window_size  yes
initial_window_width  1000
initial_window_height 650

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --clear-screen --RAW-CONTROL-CHARS

# Cursor
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Mouse
mouse_hide_wait 3.0
url_color #0087bd
url_style straight

# Copy on select
copy_on_select clipboard

# Bell
visual_bell_duration 0.0
enable_audio_bell no

# Window title
allow_remote_control yes
startup_session none

# Tab bar
tab_bar_style powerline
tab_powerline_style slant
tab_title_template " {title} "

# Colors - will be overridden by pywal
background #13120d
foreground #becbca
selection_background #becbca
selection_foreground #13120d
cursor #becbca

# Black
color0 #13120d
color8 #858e8d

# Red
color1 #4F6858
color9 #4F6858

# Green
color2 #3E867D
color10 #3E867D

# Yellow
color3 #658676
color11 #658676

# Blue
color4 #899470
color12 #899470

# Magenta
color5 #3D8686
color13 #3D8686

# Cyan
color6 #6F948E
color14 #6F948E

# White
color7 #becbca
color15 #becbca
