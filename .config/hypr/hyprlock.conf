# Hyprlock Config - Transparent Minimal
# Based on MrVivekRajan/Hyprlock-Styles

general {
    no_fade_in = false
    no_fade_out = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    contrast = 1.0
    brightness = 1.0
    vibrancy = 0.0
    vibrancy_darkness = 0.0
    color = rgba(0, 0, 0, 0.1)
}

# Hour - Large with pywal accent
label {
    monitor =
    text = cmd[update:1000] date +"%H"
    color = ${color4:-rgba(255, 185, 0, 0.9)}
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
    font_size = 180
    font_family = JetBrainsMono Nerd Font
    font_weight = bold
    position = 0, 260
    halign = center
    valign = center
}

# Minutes - White
label {
    monitor =
    text = cmd[update:1000] date +"%M"
    color = rgba(255, 255, 255, 0.95)
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
    font_size = 180
    font_family = JetBrainsMono Nerd Font
    font_weight = bold
    position = 0, 80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(255, 255, 255, 0.7)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.3)
    position = 0, -40
    halign = center
    valign = center
}

# Separator line
shape {
    monitor =
    size = 200, 1
    color = rgba(255, 255, 255, 0.15)
    rounding = 1
    position = 0, -80
    halign = center
    valign = center
}

# INPUT FIELD - Minimal transparent
input-field {
    monitor =
    size = 280, 45
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(255, 255, 255, 0.15)
    inner_color = rgba(0, 0, 0, 0.1)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    fade_timeout = 1500
    font_family = JetBrainsMono Nerd Font
    font_size = 16
    placeholder_text = 
    hide_input = false
    rounding = 20
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.3)
    shadow_boost = 1.1
    check_color = ${color7:-rgba(255, 255, 255, 0.7)}
    fail_color = ${color1:-rgba(255, 100, 100, 0.7)}
    fail_text = 
    fail_transition = 300
    position = 0, -140
    halign = center
    valign = center
}
