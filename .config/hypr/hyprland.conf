# --- Monitor ---
monitor=,preferred,auto,1.2

# --- Programs ---
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$lockScreen = hyprlock

# --- Startup ---
exec-once = pkill waybar nwg-panel DankMaterialShell 2>/dev/null; true
exec-once = quickshell -d &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swww-daemon &
exec-once = ~/.config/hypr/wallpaper.sh --init
exec-once = swaync &

# Clipboard History
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

# --- Env Vars ---
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = TERMINAL,kitty

# --- Shell Command Config ---
env = QS_CMD_VOLUME_GET,wpctl get-volume @DEFAULT_AUDIO_SINK@
env = QS_CMD_VOLUME_SET,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@
env = QS_CMD_VOLUME_MUTE,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
env = QS_CMD_VOLUME_IS_MUTED,wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED
env = QS_CMD_BRIGHTNESS_GET,brightnessctl get
env = QS_CMD_BRIGHTNESS_MAX,brightnessctl max
env = QS_CMD_BRIGHTNESS_SET,brightnessctl set
env = QS_CMD_WIFI_STATUS,nmcli radio wifi
env = QS_CMD_WIFI_TOGGLE,nmcli radio wifi
env = QS_CMD_WIFI_SCAN,nmcli -g ACTIVE,SIGNAL,FREQ,SSID,BSSID,SECURITY d w
env = QS_CMD_WIFI_CONNECT,nmcli dev wifi connect
env = QS_CMD_WIFI_SAVED,nmcli -g NAME connection show
env = QS_CMD_BT_STATUS,bluetoothctl show
env = QS_CMD_BT_DEVICES,bluetoothctl devices Connected
env = QS_CMD_BT_POWER_ON,bluetoothctl power on
env = QS_CMD_BT_POWER_OFF,bluetoothctl power off
env = QS_CMD_BT_CONNECT,bluetoothctl connect
env = QS_CMD_BT_DISCONNECT,bluetoothctl disconnect
env = QS_CMD_PLAYER_STATUS,playerctl status
env = QS_CMD_PLAYER_TITLE,playerctl metadata title
env = QS_CMD_PLAYER_ARTIST,playerctl metadata artist
env = QS_CMD_PLAYER_ART,playerctl metadata mpris:artUrl
env = QS_CMD_PLAYER_PLAY,playerctl play-pause
env = QS_CMD_PLAYER_NEXT,playerctl next
env = QS_CMD_PLAYER_PREV,playerctl previous
env = QS_CMD_SCREENSHOT_FULL,grim - | wl-copy
env = QS_CMD_SCREENSHOT_REGION,grim -g "$(slurp)" - | wl-copy
env = QS_CMD_LOCK,loginctl lock-session
env = QS_CMD_POWER_MENU,rofi -show power-menu -modi power-menu:rofi-power-menu
env = QS_CMD_NETWORK_SETTINGS,nm-connection-editor
env = QS_CMD_BT_SETTINGS,blueman-manager
env = QS_CMD_PYWAL_COLORS,~/.cache/wal/colors.json

# --- Appearance ---
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(ffffffee) rgba(999999ee) 45deg
    col.inactive_border = rgba(585b70aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(0,0,0,0.5)
    }
    blur {
        enabled = true
        size = 5
        passes = 3
    }
}

# --- Animations ---
animations {
    enabled = yes
    # Standard smooth curve without overshoot (no bounce)
    bezier = smooth, 0.25, 1, 0.5, 1
    
    animation = windows, 1, 5, smooth
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    # Using 'default' or 'smooth' ensures no bounce effect
    animation = workspaces, 1, 4, default, slide
}

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    repeat_delay = 250 
    repeat_rate = 35

    touchpad {
        natural_scroll = true
    }
}

# --- Keybindings ---
$mainMod = SUPER

# Core Binds
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, L, exec, $lockScreen
bind = ALT, w, exec, ~/.config/hypr/wallpaper.sh

# Rofi / Menu
bindr = $mainMod, SUPER_L, exec, pkill rofi || $menu
bind = $mainMod, Space, exec, pkill rofi || $menu

# Clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only -z
bind = , PRINT, exec, hyprshot -m region --raw -z | swappy -f -

# Navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move to Workspace
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5

# Media / Brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Window Rules ---
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol|pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = size 800 500, match:class ^(org.pulseaudio.pavucontrol|pavucontrol)$
windowrule = suppress_event maximize, match:class .*
